<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Lou Tchappé · Carta dei Vini</title>
  <meta name="description" content="Lou Tchappé, Cogne — La nostra carta dei vini di montagna.">
  <meta name="theme-color" content="#1A1410">

  <!-- Tipografia: Fraunces (display, calda) + Inter (testo utility) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- =========================================================
       HERO A SCHERMO INTERO
       Notte di montagna: cielo in gradiente + sagome di vette
       disegnate in SVG (nessuna foto necessaria) + leggera nebbia.
       Tutto il contenuto vive in questa unica schermata.
       ========================================================= -->
  <main class="hero">

    <!-- Sfondo: cielo a gradiente -->
    <div class="hero__sky" aria-hidden="true"></div>

    <!-- Sfondo: catena montuosa, due strati per profondità (parallasse) -->
    <svg class="hero__mountains hero__mountains--far" viewBox="0 0 1200 400" preserveAspectRatio="none" aria-hidden="true">
      <path d="M0,400 L0,210 L90,140 L160,190 L260,90 L340,160 L430,60 L520,170 L610,110 L700,200 L800,120 L900,210 L1000,150 L1090,220 L1200,160 L1200,400 Z" />
    </svg>
    <svg class="hero__mountains hero__mountains--near" viewBox="0 0 1200 400" preserveAspectRatio="none" aria-hidden="true">
      <path d="M0,400 L0,280 L70,230 L150,290 L250,200 L330,260 L420,180 L510,270 L600,210 L690,290 L780,220 L880,300 L970,240 L1080,300 L1200,260 L1200,400 Z" />
    </svg>

    <!-- Velo di nebbia in basso, ammorbidisce l'unione con il contenuto -->
    <div class="hero__mist" aria-hidden="true"></div>

    <!-- Grana sottile (texture pergamena/legno) sopra tutto -->
    <div class="hero__grain" aria-hidden="true"></div>

    <!-- CONTENUTO -->
    <div class="hero__content">

      <!-- LOGO -->
      <div class="brand" data-animate="fade-in">
        <div class="brand__badge">
          <img
            src="logo.png"
            alt="Lou Tchappé"
            class="brand__logo"
            width="120"
            height="120"
          >
        </div>
        <p class="brand__name">Lou Tchappé</p>
      </div>

      <!-- TITOLO -->
      <h1 class="hero__title" data-animate="fade-in">Carta dei Vini</h1>

      <!-- ICONA DECORATIVA: montagne + calice, in stile disegnato -->
      <svg class="hero__emblem" data-animate="fade-in" viewBox="0 0 200 60" aria-hidden="true">
        <path class="emblem__mountains" d="M10,46 L34,22 L48,36 L72,12 L96,46 Z" />
        <line class="emblem__tree" x1="118" y1="46" x2="118" y2="20" />
        <path class="emblem__pine" d="M118,18 L110,32 L126,32 Z M118,24 L112,36 L124,36 Z" />
        <path class="emblem__bottle" d="M148,10 h6 v4 l3,4 v26 h-12 v-26 l3,-4 Z" />
        <path class="emblem__glass" d="M168,18 a8,7 0 1,0 16,0 a8,7 0 1,0 -16,0 M176,25 v14 M170,44 h12" />
      </svg>

      <!-- Linea decorativa, richiama il dettaglio "etichetta" -->
      <div class="divider" data-animate="fade-in" aria-hidden="true"></div>

      <!-- CALL TO ACTION -->
      
        href="CartaVini.pdf"
        target="_blank"
        rel="noopener noreferrer"
        class="cta"
        id="open-wine-list"
        data-animate="fade-in"
      >
        <span class="cta__icon" aria-hidden="true">🍷</span>
        <span class="cta__label">Consulta la carta dei vini</span>
      </a>

      <!-- FOOTER -->
      <footer class="footer" data-animate="fade-in">
        <span class="footer__snowflake" aria-hidden="true">❆</span>
        <span class="footer__text">Lou Tchappé&nbsp;•&nbsp;Cogne&nbsp;•&nbsp;Valle d'Aosta</span>
      </footer>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
